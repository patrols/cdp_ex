name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + type-check + unit tests across a min and a current Elixir/OTP pair.
  # No Chrome here — these are the fast, deterministic checks (`mix ci` excludes
  # the integration tag).
  check:
    name: check (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15.8"
            otp: "26.2"
          - elixir: "1.19.5"
            otp: "28.1"
          - elixir: "1.20.0"
            otp: "28.1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps and _build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache Dialyzer PLT
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix ci

  # Real-Chrome integration tests, on the current Elixir/OTP only.
  integration:
    name: integration (real Chrome)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
        with:
          chrome-version: stable

      - name: Cache deps and _build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-integration-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-integration-

      - run: mix deps.get

      - name: Run integration tests
        env:
          CDP_EX_CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: mix test --only integration

  # Static security audit of these workflow files (script injection, token
  # permissions, dangerous triggers, action pinning). Fast; no Elixir/Chrome.
  # The action-pinning policy lives in .github/zizmor.yml.
  workflow-audit:
    name: workflow audit (zizmor)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - run: pip install zizmor==1.25.2

      - name: Audit workflows
        run: zizmor --offline .github/workflows/
